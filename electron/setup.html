<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0a14; color: #cdd6f4;
    font-family: 'JetBrains Mono','Cascadia Code','Consolas',monospace;
    width:100vw; height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow:hidden; user-select:none; -webkit-app-region:drag;
  }
  .card {
    width:440px; background:#13131f;
    border:1px solid #2a2a3e; border-radius:12px;
    padding:32px 28px; display:flex; flex-direction:column; gap:18px;
    -webkit-app-region:no-drag;
  }
  .logo   { font-size:32px; text-align:center; filter:drop-shadow(0 0 12px rgba(137,180,250,.5)); }
  .title  { text-align:center; font-size:15px; font-weight:700; color:#89b4fa; letter-spacing:.08em; }
  .sub    { text-align:center; font-size:11px; color:#585b70; line-height:1.7; margin-top:4px; }
  hr      { border:none; border-top:1px solid #2a2a3e; }
  .lbl    { font-size:10px; color:#6c7086; text-transform:uppercase; letter-spacing:.1em; margin-bottom:6px; }
  .row    {
    display:flex; align-items:center; justify-content:space-between;
    font-size:12px; padding:8px 12px;
    background:#0d0d1a; border:1px solid #1e1e2e; border-radius:6px;
  }
  .rlbl   { color:#a6adc8; }
  .badge  { font-size:10px; font-weight:700; padding:2px 8px; border-radius:4px; letter-spacing:.05em; }
  .ok     { background:#1e3a2a; color:#a6e3a1; border:1px solid #2d5c3f; }
  .miss   { background:#3a1e1e; color:#f38ba8; border:1px solid #5c2d2d; }
  .chk    { background:#1e1e2e; color:#6c7086; border:1px solid #2a2a3e; }
  .btn {
    width:100%; padding:10px 0; border:none; border-radius:6px;
    font-family:inherit; font-size:12px; font-weight:700; letter-spacing:.06em;
    cursor:pointer; transition:opacity .15s;
  }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  .btn.primary  { background:#89b4fa; color:#0a0a14; }
  .btn.purple   { background:#cba6f7; color:#0a0a14; }
  .btn.ghost    { background:transparent; color:#585b70; border:1px solid #2a2a3e; }
  .btn:not(:disabled):hover { opacity:.85; }
  .msg  { font-size:11px; color:#6c7086; text-align:center; min-height:16px; line-height:1.6; }
  .green{ color:#a6e3a1; } .red{ color:#f38ba8; } .dim{ color:#585b70; }
  .bar-wrap { background:#1e1e2e; border-radius:4px; height:6px; overflow:hidden; display:none; }
  .bar-fill { height:100%; background:#89b4fa; width:0%; transition:width .2s; }
  .spin {
    display:inline-block; width:12px; height:12px;
    border:2px solid #2a2a3e; border-top-color:#89b4fa;
    border-radius:50%; animation:spin .7s linear infinite;
    vertical-align:middle; margin-right:6px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">&#9685;</div>
  <div>
    <div class="title">SOFT QUANT &mdash; First Run Setup</div>
    <div class="sub">Checking required dependencies before launch.</div>
  </div>

  <hr/>

  <div>
    <div class="lbl">Dependencies</div>
    <div class="row">
      <span class="rlbl">Ollama (local AI runtime)</span>
      <span class="badge chk" id="badge"><span class="spin"></span>Checking</span>
    </div>
  </div>

  <!-- Progress bar (shown during download / model pull) -->
  <div class="bar-wrap" id="bar-wrap"><div class="bar-fill" id="bar"></div></div>

  <!-- Status message line -->
  <div class="msg" id="status-msg"><span class="spin"></span>Starting up…</div>

  <!-- Buttons shown only when needed -->
  <div id="actions" style="display:none;flex-direction:column;gap:8px;">
    <button class="btn purple" id="btn-download" style="display:none" onclick="openDownload()">&#8659; Open Ollama Download Page</button>
    <button class="btn ghost"  id="btn-done"     style="display:none" onclick="installerDone()">&#10003; Done — Ollama is installed</button>
    <button class="btn primary" id="btn-launch"  style="display:none" onclick="proceed()">&#9654; Launch Soft Quant</button>
    <button class="btn ghost"  id="btn-skip"     style="display:none" onclick="proceed()">Skip for now (AI features disabled)</button>
  </div>
</div>

<script>
const api = window.setupAPI

function setBadge(cls, text) {
  const b = document.getElementById('badge')
  b.className = 'badge ' + cls
  b.innerHTML = text
}
function setStatus(msg, cls) {
  const el = document.getElementById('status-msg')
  el.className = 'msg ' + (cls || '')
  el.innerHTML = msg
}
function showActions(...ids) {
  document.getElementById('actions').style.display = 'flex'
  ids.forEach(id => { document.getElementById(id).style.display = '' })
}
function setProgress(pct) {
  const wrap = document.getElementById('bar-wrap')
  const bar  = document.getElementById('bar')
  wrap.style.display = pct > 0 && pct < 100 ? 'block' : 'none'
  bar.style.width    = pct + '%'
}

function openDownload() {
  api.openExternal('https://ollama.com/download/windows')
  setStatus('Installer page opened in browser. Run the installer, then click the button below.')
  showActions('btn-done', 'btn-skip')
}
function installerDone() {
  api.installerDone()
  setStatus('<span class="spin"></span>Waiting for Ollama to become ready…')
  document.getElementById('btn-done').style.display = 'none'
}
function proceed() { api.proceed() }

// ── Wire up events pushed from main process ────────────────────────────────
api.onStep(    ({ step, total, label }) => setStatus(`Step ${step}/${total}: ${label}`))
api.onProgress(({ pct })               => setProgress(pct))
api.onStatus(  ({ msg })               => setStatus(msg))

api.onWaitForUser(() => {
  setStatus('Run the installer that just opened, then click the button below.')
  showActions('btn-done', 'btn-skip')
})

api.onDone(() => {
  setProgress(0)
  setBadge('ok', '&#10003; Ready')
  setStatus('All done! Launching…', 'green')
  showActions('btn-launch')
})

api.onError(({ msg }) => {
  setBadge('miss', '&#9888; Error')
  setStatus(msg, 'red')
  showActions('btn-download', 'btn-skip')
})

// ── Initial check: if Ollama is already running, show Launch immediately ────
async function init() {
  try {
    const { installed, running } = await api.checkOllama()
    if (running) {
      setBadge('ok', '&#10003; Running')
      // ensureOllama will also detect this and call onDone automatically;
      // no need to do anything extra here.
    } else if (installed) {
      setBadge('ok', '&#10003; Installed')
    } else {
      setBadge('miss', 'Not installed')
    }
  } catch (_) {
    setBadge('miss', 'Unknown')
  }
}
init()
</script>
</body>
</html>
