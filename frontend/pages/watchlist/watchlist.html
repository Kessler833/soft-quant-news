<div id="wl-left" style="overflow-y:auto;border-right:1px solid var(--bg-tertiary);">
  <div class="panel-header">&#9678; Watchlist</div>
  <div id="wl-add-row" style="padding:10px 14px;border-bottom:1px solid var(--bg-tertiary);display:flex;gap:8px;align-items:center;">
    <input id="wl-input" class="wl-input" type="text" placeholder="Add ticker..." maxlength="6" />
    <button class="open-symbol-browser wl-btn" data-target="wl-input">&#9672;</button>
    <button id="wl-add-btn" class="wl-btn wl-btn--primary">+ Add</button>
  </div>
  <div id="wl-list" style="padding:8px 14px;"></div>
</div>

<div id="wl-right" style="display:flex;flex-direction:column;overflow:hidden;">
  <div class="panel-header">&#9654; Ticker Detail</div>
  <div id="wl-detail" style="flex:1;overflow-y:auto;padding:12px 16px;">
    <div style="color:var(--text-muted);font-size:13px;">Select a ticker from your watchlist to view news and analysis.</div>
  </div>
</div>
