    <div style="display:flex;align-items:center;justify-content:center;height:120px;">
      <div class="spinner spinner--large"></div>
    </div>
  </div>
</div>

      <div style="color:var(--text-muted);font-size:12px;padding:8px 0;">Loading...</div>
    </div>
  </div>

</div>
